<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cart - SHOP.CO</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" href="image/online-shop.png" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <div class="top-bar">
      <i class="fa-solid fa-truck"></i> Sign up and get 20% off to your first
      order.
      <a href="register.html">Sign Up Now</a>
    </div>

    <header class="main-header">
      <a class="logo" href="index.html">SHOP.CO</a>
      <nav id="primaryNav" class="nav-menu">
        <a href="index.html">Home</a>
        <a href="#">On Sale</a>
        <a href="#">New Arrivals</a>
        <a href="#">Brands</a>
      </nav>
      <div class="header-icons">
        <button
          class="menu-toggle"
          type="button"
          aria-label="Toggle menu"
          aria-controls="primaryNav"
          aria-expanded="false"
        >
          <i class="fa-solid fa-bars"></i>
        </button>
        <div id="headerSearchBox" class="header-search">
          <i class="fa-solid fa-magnifying-glass search-input-icon"></i>
          <input
            id="headerSearchInput"
            class="search-input"
            type="search"
            placeholder="Search products..."
            autocomplete="off"
          />
        </div>
        <a class="cart-link" href="cart.html" aria-label="Open cart">
          <i class="fa-solid fa-cart-shopping"></i>
          <span id="cartCount" class="cart-count" hidden>0</span>
        </a>
        <a
          id="userAccount"
          class="user-account"
          href="signin.html"
          aria-label="User account"
        >
          <i class="fa-solid fa-user" aria-hidden="true"></i>
          <span id="userNameDisplay" class="user-name" hidden></span>
        </a>
      </div>
    </header>

    <main class="container py-4 py-md-5">
      <h1 class="fw-bold mb-4">Your Cart</h1>

      <div id="emptyCartState" class="card border-0 shadow-sm text-center p-4" hidden>
        <p class="text-secondary mb-3">No products in your cart yet.</p>
        <a class="btn btn-dark rounded-pill px-4" href="index.html">Start Shopping</a>
      </div>

      <div id="cartLayout" class="row g-4" hidden>
        <section class="col-lg-8">
          <ul id="cartItems" class="list-unstyled m-0"></ul>
        </section>

        <aside class="col-lg-4">
          <div class="card border-0 shadow-sm p-3 p-md-4" style="position: sticky; top: 96px;">
            <h2 class="h4 fw-bold mb-3">Order Summary</h2>
            <div class="d-flex justify-content-between mb-2 text-secondary">
              <span>Items</span>
              <strong id="summaryItems">0</strong>
            </div>
            <div class="d-flex justify-content-between mb-2 text-secondary">
              <span>Subtotal</span>
              <strong id="summarySubtotal">$0.00</strong>
            </div>
            <hr class="my-3" />
            <div class="d-flex justify-content-between fs-5 fw-bold mb-3">
              <span>Total</span>
              <span id="summaryTotal">$0.00</span>
            </div>

            <button id="clearCartBtn" type="button" class="btn btn-outline-dark rounded-pill w-100 mb-2">
              Clear Cart
            </button>
            <a class="btn btn-dark rounded-pill w-100" href="index.html">Continue Shopping</a>
          </div>
        </aside>
      </div>
    </main>

    <script type="module" src="script.js"></script>
    <script type="module" src="js/pages/cart.js"></script>
  </body>
</html>
